<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
</head>

<body>
    <header th:fragment="header_nav_admin"
        class="flex flex-col border-b border-solid border-border-color bg-white dark:bg-background-dark dark:border-dark-ink/20 sticky top-0 z-50">

        <div class="flex items-center px-6 sm:px-10 lg:px-6 py-3">
            <nav class="hidden md:flex gap-6 lg:gap-8 items-center">
                <a th:href="@{/}"
                    class="text-dark-ink dark:text-background-light text-sm font-medium hover:text-primary dark:hover:text-primary transition-colors">Về
                    Trang Chủ</a>
            </nav>

            <div class="flex items-center gap-4 ml-auto">
                <div sec:authorize="isAuthenticated()" class="flex items-center gap-3 pl-4">
                    <div class="relative flex items-center gap-3" id="userMenuDropdown">

                        <div class="hidden lg:flex flex-col items-end cursor-pointer" onclick="toggleUserMenu()">
                            <span class="text-sm font-bold text-dark-ink dark:text-white leading-tight"
                                sec:authentication="principal.fullName">User Name</span>

                            <span class="text-[10px] font-bold text-primary uppercase tracking-wider">
                                <th:block th:each="auth : ${#authentication.authorities}">
                                    <span th:if="${auth.authority.startsWith('ROLE_')}"
                                        th:text="${auth.authority.replace('ROLE_', '')}">ADMIN</span>
                                </th:block>
                            </span>
                        </div>

                        <button onclick="toggleUserMenu()"
                            class="flex items-center justify-center overflow-hidden rounded-full h-10 w-10 border border-border-color hover:ring-2 hover:ring-primary/50 transition-all focus:outline-none">
                            <img th:src="'https://ui-avatars.com/api/?name=' + ${#authentication.principal.fullName} + '&background=4cae4f&color=fff'"
                                alt="User" class="h-full w-full object-cover">
                        </button>

                        <div id="userDropdownContent"
                            class="hidden absolute right-0 top-full mt-2 w-56 bg-white dark:bg-background-dark border border-border-color rounded-xl shadow-xl z-50 overflow-hidden transform origin-top-right transition-all">
                            <div class="px-4 py-3 border-b border-gray-100 dark:border-gray-700">
                                <p class="text-xs text-gray-500 dark:text-gray-400">Đăng nhập với</p>
                                <p class="text-sm font-bold text-dark-ink dark:text-white truncate"
                                    sec:authentication="name">user@email.com</p>
                            </div>

                            <a th:href="@{/user/favorites}"
                                class="flex items-center gap-2 px-4 py-2.5 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
                                <span class="material-symbols-outlined text-lg">favorite</span> Yêu Thích Của Tôi
                            </a>

                            <a th:href="@{/user/settings}"
                                class="flex items-center gap-2 px-4 py-2.5 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
                                <span class="material-symbols-outlined text-lg">settings</span> Cài Đặt Cá Nhân
                            </a>
                            <a th:href="@{/recipes/request-ingredient}"
                                class="flex items-center gap-2 px-4 py-2.5 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors">
                                <span class="material-symbols-outlined text-lg">grocery</span> Yêu Cầu Nguyên Liệu
                            </a>

                            <div class="border-t border-gray-100 dark:border-gray-700">
                                <form th:action="@{/logout}" method="post" class="block">
                                    <button type="submit"
                                        class="w-full flex items-center gap-2 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 text-left transition-colors">
                                        <span class="material-symbols-outlined text-lg">logout</span> Đăng Xuất
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <button onclick="toggleMobileMenu()"
                    class="flex md:hidden items-center justify-center rounded-full h-10 w-10 hover:bg-gray-100 dark:hover:bg-gray-800 text-dark-ink dark:text-white transition-colors">
                    <span class="material-symbols-outlined text-2xl">menu</span>
                </button>
            </div>
        </div>

        <div id="mobileMenu"
            class="hidden md:hidden border-t border-border-color bg-card-white dark:bg-background-dark animate-fade-in-down">
            <div class="flex flex-col p-4 gap-2">

                <div sec:authorize="isAuthenticated()"
                    class="mb-2 pb-3 border-b border-border-color flex items-center gap-3">
                    <img th:src="'https://ui-avatars.com/api/?name=' + ${#authentication.principal.fullName} + '&background=4cae4f&color=fff'"
                        alt="User" class="h-10 w-10 rounded-full object-cover">
                    <div class="flex flex-col">
                        <span class="text-sm font-bold text-dark-ink dark:text-white"
                            sec:authentication="principal.fullName">User Name</span>
                        <span class="text-[10px] font-bold text-primary uppercase tracking-wider">
                            <th:block th:each="auth : ${#authentication.authorities}">
                                <span th:if="${auth.authority.startsWith('ROLE_')}"
                                    th:text="${auth.authority.replace('ROLE_', '')}">Role</span>
                            </th:block>
                        </span>
                    </div>
                </div>

                <a th:href="@{/}"
                    class="p-3 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-800 font-medium text-dark-ink dark:text-white">Trang
                    Chủ</a>

                <div sec:authorize="isAuthenticated()" class="mt-2 pt-2 border-t border-border-color">
                    <a th:href="@{/recipes/create}" class="flex items-center gap-2 p-3 text-primary font-bold">
                        <span class="material-symbols-outlined">add_circle</span> Thêm Công Thức
                    </a>
                    <a th:href="@{/user/settings}"
                        class="flex items-center gap-2 p-3 text-dark-ink dark:text-white font-medium">
                        <span class="material-symbols-outlined">settings</span> Cài Đặt
                    </a>
                    <form th:action="@{/logout}" method="post" class="block w-full">
                        <button type="submit"
                            class="flex items-center gap-2 p-3 w-full text-red-600 font-bold hover:bg-red-50 dark:hover:bg-red-900/10 rounded-lg">
                            <span class="material-symbols-outlined">logout</span> Đăng Xuất
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <script>
            function toggleUserMenu() {
                const menu = document.getElementById('userDropdownContent');
                menu.classList.toggle('hidden');
            }

            function toggleMobileMenu() {
                const menu = document.getElementById('mobileMenu');
                menu.classList.toggle('hidden');
            }

            window.onclick = function (event) {
                const dropdown = document.getElementById('userDropdownContent');
                const button = document.getElementById('userMenuDropdown');
                if (dropdown && !dropdown.classList.contains('hidden')) {
                    if (!button.contains(event.target)) {
                        dropdown.classList.add('hidden');
                    }
                }
            };
        </script>
    </header>
</body>

</html>
